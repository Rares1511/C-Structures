name: C Data Structures CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  memcheck-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential valgrind time

    - name: Build and Run Tests
      run: |
        # No sudo needed!
        mkdir -p logs
        make unittest memcheck=true SEED=1234
        echo "MEMORY CHECK LOGS:"
        cat logs/memcheck.ansi
        echo "TEST DEBUG LOGS:"
        cat logs/debug.ansi
        echo "TEST RESULTS LOGS:"
        cat logs/results.ansi
        rm -rf logs